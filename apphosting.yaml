# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  # Map the Admin SDK private key secret
  - variable: ADMIN_PRIVATE_KEY
    secret: myApiKeySecret
  
  # Also map your public API key for the browser
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCp2U7DUKBzT7uZeSicNW7qazasSTCLWQk
    availability:
      - BUILD
      - RUNTIME
